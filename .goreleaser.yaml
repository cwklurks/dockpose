version: 2

project_name: dockpose

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: dockpose
    main: ./cmd/dockpose
    binary: dockpose
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: packages
    package_name: dockpose
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/cwklurks/dockpose
    description: A keyboard-driven TUI for managing Docker Compose stacks.
    license: MIT
    maintainer: Connor Klann <connorklann@gmail.com>
    formats:
      - deb
      - rpm

# Homebrew tap.
#
# NOTE: the default GITHUB_TOKEN cannot push to cwklurks/homebrew-tap
# because it's scoped to the current repository. A personal access token
# (or fine-grained token) with `contents: write` on homebrew-tap must be
# set as the repo secret HOMEBREW_TAP_GITHUB_TOKEN.
#
# When the secret is absent, `skip_upload: auto` keeps the release from
# failing — the formula is generated locally but not pushed.
brews:
  - name: dockpose
    repository:
      owner: cwklurks
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/cwklurks/dockpose
    description: A keyboard-driven TUI for managing Docker Compose stacks.
    license: MIT
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(brew): bump {{ .ProjectName }} to {{ .Tag }}"
    test: |
      system "#{bin}/dockpose", "--version"
    install: |
      bin.install "dockpose"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
