name: Feature request
description: Suggest a dockpose workflow or capability
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Compose workflow is currently painful?
      placeholder: I manage several stacks and need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should dockpose do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives tried
      description: CLI commands, lazydocker, Dockge, Portainer, scripts, etc.
  - type: textarea
    id: context
    attributes:
      label: Environment / stack shape
      description: Number of stacks, local vs SSH, profiles, typical services.
